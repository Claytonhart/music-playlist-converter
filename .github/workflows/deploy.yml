name: Deploy to GitHub Pages

# Build the Vite app and publish it to GitHub Pages on every push to master.
# Requires: repo Settings -> Pages -> Source set to "GitHub Actions".
on:
  push:
    branches: [master]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Permissions the GitHub Pages deploy actions need.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but don't queue redundant runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
